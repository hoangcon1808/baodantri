name: Tự động cập nhật tin Dân Trí

# Cấu hình thời gian chạy 10 phút/lần
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # Cho phép bấm nút chạy thủ công trên Github

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # Cấp quyền cho Action được phép ghi (commit & push) vào repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Thiết lập Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Chạy Script lấy tin
        run: python fetch_news.py

      - name: Commit và Push file JSON lên GitHub
        run: |
          # Thiết lập thông tin bot để commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Thêm file json vào git
          git add dantri_news.json
          
          # Chỉ commit nếu có sự thay đổi (tránh lỗi khi không có tin mới)
          git commit -m "Cập nhật dữ liệu Dân Trí [skip ci]" || exit 0
          
          # Đẩy code lên nhánh hiện tại
          git push
