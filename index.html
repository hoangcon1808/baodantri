<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin Tức Dân Trí - Đa Chủ Đề</title>
    <style>
        :root {
            --primary-color: #00803d; 
            --bg-color: #f0f2f5;
            --text-color: #333;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px; 
            margin: 0 auto; 
        }
        header {
            text-align: center; 
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--primary-color);
        }
        h1 { color: var(--primary-color); font-size: 2rem; margin-bottom: 5px; }
        header p { color: #666; font-size: 0.95rem; }
        
        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #555;
            background: #e8eaf6;
            padding: 10px 15px;
            border-radius: 8px;
        }
        .refresh-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background-color: #006630; }
        
        .news-item { 
            background: var(--card-bg); 
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border-left: 5px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .news-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.12); 
        }
        .news-item h2 { margin-bottom: 10px; font-size: 1.25rem; line-height: 1.4; }
        .news-item h2 a { text-decoration: none; color: #111; }
        .news-item h2 a:hover { color: var(--primary-color); text-decoration: underline; }
        .news-item p { margin-bottom: 15px; color: #555; font-size: 0.95rem; }
        .news-tag { 
            font-size: 0.8rem; 
            color: white; 
            background: #e74c3c; 
            padding: 4px 10px; 
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
        }
        .status { text-align: center; font-style: italic; color: #666; padding: 20px; }
        
        @media (max-width: 500px) {
            .meta-info { flex-direction: column; gap: 10px; text-align: center; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Auto Get Báo Dân Trí</h1>
            <p>Tự động tổng hợp tin mới mỗi 10 phút</p>
        </header>

        <div class="meta-info">
            <span id="last-updated">Trạng thái: Đang kết nối...</span>
            <button class="refresh-btn" onclick="fetchAndDisplayNews()">🔄 Làm mới tin</button>
        </div>

        <div id="news-container">
            <p class="status">⏳ Đang lấy dữ liệu mới nhất...</p>
        </div>
    </div>

    <script>
        async function fetchAndDisplayNews() {
            const container = document.getElementById('news-container');
            const timeSpan = document.getElementById('last-updated');
            const jsonUrl = 'dantri_news.json?t=' + new Date().getTime(); 

            container.innerHTML = '<p class="status">⏳ Đang tải tin tức...</p>';

            try {
                const response = await fetch(jsonUrl);
                if (!response.ok) throw new Error('Không tìm thấy dữ liệu.');

                const newsData = await response.json();
                container.innerHTML = ''; 

                if (newsData.length === 0) {
                    container.innerHTML = '<p class="status">Chưa có bài báo nào được tải xuống.</p>';
                    return;
                }

                const now = new Date();
                timeSpan.innerHTML = 'Lần tải cuối: <b>' + now.toLocaleTimeString('vi-VN') + '</b>';

                newsData.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    
                    // Kiểm tra và hiển thị an toàn, tránh lỗi "undefined"
                    let summaryText = item.summary ? item.summary : 'Nhấn vào tiêu đề để xem chi tiết bài viết...';
                    let categoryText = item.category ? item.category : 'Tin tức';
                    
                    div.innerHTML = `
                        <h2><a href="${item.link}" target="_blank">${item.title}</a></h2>
                        <p>${summaryText}</p>
                        <span class="news-tag">📌 ${categoryText}</span>
                    `;
                    container.appendChild(div);
                });

            } catch (error) {
                console.error("Lỗi: ", error);
                container.innerHTML = '<p class="status" style="color: red;">❌ Không tải được dữ liệu. Vui lòng chạy GitHub Actions để tạo file JSON.</p>';
            }
        }

        window.onload = fetchAndDisplayNews;
    </script>

</body>
</html>
